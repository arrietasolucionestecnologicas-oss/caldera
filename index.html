<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.S.T - Gemelo Digital Prototipo IoT Completo</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6; 
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --pipe-steam: #cbd5e1;
            --wire-red: #ef4444;
            --wire-blk: #334155;
            --wire-sig: #eab308;
            --wire-data: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}

        header { background: linear-gradient(90deg, #020617 0%, #0f172a 100%); padding: 1.5rem 2rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }

        .brand-ast { font-weight: 800; font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; }
        .project-title { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        main { display: grid; grid-template-columns: 350px 1fr 300px; gap: 1.5rem; padding: 1.5rem; flex: 1; }

        .panel { background-color: var(--bg-panel); border-radius: 8px; padding: 1.5rem; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10;}
        .panel-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 600; }
        input[type="number"], input[type="text"], select { width: 100%; background-color: #0f172a; border: 1px solid #475569; color: var(--text-main); padding: 0.6rem; border-radius: 4px; font-size: 1rem; transition: border-color 0.2s; }
        input[type="number"]:focus, input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); }

        .btn-update { width: 100%; background-color: var(--bg-dark); color: var(--text-main); border: 1px solid var(--accent); padding: 1rem; border-radius: 4px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-top: 1rem; }
        .btn-update:hover { background-color: var(--accent); color: white; }
        
        .btn-wifi { width: 100%; background-color: var(--success); color: white; border: none; padding: 1rem; border-radius: 4px; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-top: 0.5rem; }
        .btn-wifi:hover { background-color: #059669; }

        .diagram-container { display: flex; align-items: center; justify-content: center; background-color: #020617; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #334155; padding: 0;}
        svg { width: 100%; height: auto; max-height: 750px; background-color: #020617;}
        
        .component { stroke-width: 2.5; fill: #1e293b; stroke: #475569; }
        .component-text { font-size: 14px; font-weight: bold; fill: #f8fafc; font-family: sans-serif; }
        .data-tag { font-size: 13px; fill: var(--success); font-weight: bold; font-family: monospace; background: #000;}
        
        /* Motor de Animación Constante */
        .flow-line { fill: none; stroke-dasharray: 12 8; stroke-dashoffset: 0; animation: flowConstant 0.8s linear infinite; }
        @keyframes flowConstant { to { stroke-dashoffset: -40; } }

        .pipe-steam { stroke: var(--pipe-steam); stroke-width: 8; }
        .wire-power { stroke: var(--warning); stroke-width: 3; }
        
        @keyframes flameWobble { 0%, 100% { transform: scaleY(1) translateY(0); } 50% { transform: scaleY(1.1) translateY(-4px); } }
        .flame-anim { animation: flameWobble 0.5s ease-in-out infinite; transform-origin: bottom; }

        @keyframes rotateTurbine { to { transform: rotate(360deg); } }
        .turbine-blades { animation: rotateTurbine 0.5s linear infinite; transform-origin: 550px 200px; }

        @keyframes ledGlow { 0%, 100% { fill: #ef4444; filter: drop-shadow(0 0 10px #ef4444); } 50% { fill: #991b1b; filter: drop-shadow(0 0 2px #991b1b); } }
        .led-active { animation: ledGlow 0.5s ease-in-out infinite; }

        .result-box { background-color: #0f172a; border: 1px solid #334155; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .result-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.3rem; }
        .result-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: monospace; }
        
        .status-dot { height: 12px; width: 12px; background-color: var(--danger); border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="brand-ast">A.S.T Soluciones Tecnológicas</div>
            <div class="project-title">Gemelo Digital IoT: Olla + MAX6675 + ESP32</div>
        </div>
        <div style="text-align: right; display: flex; align-items: center;">
            <span class="status-dot" id="conexion-status"></span>
            <div>
                <div style="color: var(--text-muted); font-size: 0.8rem;">ENLACE ESP32</div>
                <div style="font-weight: bold; color: var(--text-main);" id="conexion-texto">DESCONECTADO</div>
            </div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-title">Telemetría Wi-Fi</div>
            <form id="sim-form">
                <div class="form-group" style="background: #020617; padding: 10px; border-radius: 5px; border: 1px solid #3b82f6;">
                    <label style="color: #3b82f6;">Dirección IP del ESP32</label>
                    <input type="text" id="ip_esp32" value="192.168." placeholder="Ej: 192.168.43.100" required>
                    <button type="button" class="btn-wifi" id="btn-conectar-iot">ENLAZAR SENSOR EN VIVO</button>
                </div>
                
                <hr style="border-color: #334155; margin: 20px 0;">

                <div class="form-group">
                    <label>Fuente Térmica (Combustible)</label>
                    <select id="tipo_combustible">
                        <option value="biomasa">Biomasa Pellet (17 MJ/kg)</option>
                        <option value="gas">Gas Natural (50 MJ/kg)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Masa Quemada (Gramos)</label>
                    <input type="number" id="masa_fuel" value="250" step="10">
                </div>
                <div class="form-group">
                    <label>Tiempo de Prueba (Segundos)</label>
                    <input type="number" id="tiempo_prueba" value="60" step="10">
                </div>
                <div class="form-group">
                    <label>Temp. Termocupla K (°C) [Automático]</label>
                    <input type="number" id="temp_vapor" value="0" step="0.1" readonly style="background: #1e293b; color: #10b981; font-weight: bold;">
                </div>
                <div class="form-group">
                    <label>Voltaje ESP32 (V) [Manual/Estimado]</label>
                    <input type="number" id="voltaje_gen" value="3.2" step="0.1">
                </div>
                <div class="form-group">
                    <label>Resistencia Carga (Ohmios)</label>
                    <input type="number" id="resistencia" value="330" step="10">
                </div>

                <button type="button" class="btn-update" id="btn-update">FORZAR CÁLCULO</button>
            </form>
        </div>

        <div class="diagram-container">
            <svg viewBox="0 0 1000 700">
                <rect x="80" y="450" width="160" height="20" fill="#334155" rx="5"/>
                <g class="flame-anim">
                    <path d="M 120 450 Q 160 380 200 450 Z" fill="#ef4444" id="svg-fuego-ext"/>
                    <path d="M 140 450 Q 160 410 180 450 Z" fill="#f59e0b" id="svg-fuego-int"/>
                </g>
                <text x="160" y="490" text-anchor="middle" class="data-tag" style="fill: #ef4444;" id="tag-qin">Qin: 0 W</text>

                <rect x="70" y="250" width="180" height="180" class="component" rx="25" />
                <path d="M 50 250 L 270 250" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
                <rect x="150" y="210" width="20" height="40" fill="#1e293b" />
                <text x="160" y="340" text-anchor="middle" class="component-text">OLLA A PRESIÓN</text>
                
                <rect x="250" y="290" width="30" height="20" fill="#b45309" />
                <path class="flow-line pipe-steam" d="M 280 300 L 450 300 L 450 200 L 520 200" />
                <text x="360" y="285" text-anchor="middle" class="data-tag" style="fill: #cbd5e1;">VAPOR ALTA PRESIÓN</text>

                <rect x="360" y="220" width="50" height="40" fill="#1d4ed8" rx="4" />
                <text x="385" y="245" text-anchor="middle" class="component-text" style="font-size: 11px;">MAX6675</text>
                
                <path d="M 360 250 L 320 300" stroke="#fbbf24" stroke-width="3" fill="none" />
                <circle cx="320" cy="300" r="5" fill="#fbbf24" />
                <text x="340" y="325" text-anchor="middle" class="data-tag" id="tag-temp">0.0 °C</text>

                <path class="flow-line" d="M 385 260 L 385 530 L 630 530" stroke="var(--wire-data)" stroke-width="2" />
                <path class="flow-line" d="M 395 260 L 395 540 L 630 540" stroke="var(--wire-sig)" stroke-width="2" />

                <rect x="550" y="160" width="80" height="80" fill="#64748b" rx="10" />
                <path d="M 630 180 L 660 180 L 660 220 L 630 220 Z" fill="#94a3b8" />
                
                <g class="turbine-blades">
                    <path d="M 500 160 L 550 200 L 500 240 Z" fill="#cbd5e1" opacity="0.9" />
                    <path d="M 600 160 L 550 200 L 600 240 Z" fill="#cbd5e1" opacity="0.9" />
                    <circle cx="550" cy="200" r="10" fill="#f8fafc" />
                </g>
                <text x="590" y="150" text-anchor="middle" class="component-text">GENERADOR DC</text>

                <path class="flow-line wire-power" d="M 660 190 L 800 190 L 800 480" />
                <path d="M 660 210 L 820 210 L 820 480" stroke="var(--wire-blk)" stroke-width="3" fill="none" />

                <rect x="550" y="480" width="400" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="10" />
                <path d="M 560 495 L 940 495" stroke="#ef4444" stroke-width="3" />
                <path d="M 560 510 L 940 510" stroke="#3b82f6" stroke-width="3" />
                
                <rect x="630" y="530" width="120" height="60" fill="#0f172a" rx="5" />
                <rect x="640" y="540" width="40" height="40" fill="#334155" />
                <text x="710" y="565" text-anchor="middle" class="component-text" style="font-size: 12px;">ESP32 Wi-Fi</text>
                <g fill="#94a3b8">
                    <circle cx="635" cy="535" r="2"/><circle cx="645" cy="535" r="2"/><circle cx="655" cy="535" r="2"/><circle cx="665" cy="535" r="2"/>
                    <circle cx="635" cy="585" r="2"/><circle cx="645" cy="585" r="2"/><circle cx="655" cy="585" r="2"/><circle cx="665" cy="585" r="2"/>
                </g>

                <rect x="800" y="540" width="10" height="30" fill="#d97706" rx="2" />
                <path d="M 800 545 L 810 545" stroke="#000" stroke-width="2"/>
                <path d="M 800 555 L 810 555" stroke="#ef4444" stroke-width="2"/>
                <circle cx="850" cy="555" r="15" class="led-active" />
                
                <path d="M 805 495 L 805 540" stroke="#94a3b8" stroke-width="2" />
                <path d="M 805 570 L 805 590 L 850 590 L 850 570" stroke="#94a3b8" stroke-width="2" />
                <path d="M 850 540 L 850 510 L 820 510" stroke="#94a3b8" stroke-width="2" />
                
                <text x="850" y="520" text-anchor="middle" class="data-tag" style="fill: var(--warning);" id="tag-voltaje">3.20 V</text>
                <text x="850" y="605" text-anchor="middle" class="data-tag" style="fill: var(--success);" id="tag-potencia">31 mW</text>
            </svg>
        </div>

        <div class="panel">
            <div class="panel-title">Métricas de Generación</div>
            <div class="result-box">
                <div class="result-label">Potencia Eléctrica Útil</div>
                <div class="result-value" id="res-elec" style="color: var(--success);">0.00 mW</div>
            </div>
            <div class="result-box">
                <div class="result-label">Potencia Térmica Base (Qin)</div>
                <div class="result-value" id="res-termico" style="color: var(--danger);">0.00 W</div>
            </div>
            <div class="result-box">
                <div class="result-label">Eficiencia (Ciclo Abierto)</div>
                <div class="result-value" id="res-eficiencia" style="color: var(--warning);">0.0000 %</div>
            </div>
        </div>
    </main>

    <script src="simulador.js"></script>
</body>
</html>
