<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Térmico - A.S.T. IoT</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6; 
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --pipe-steam: #cbd5e1;
            --wire-red: #ef4444;
            --wire-blk: #334155;
            --wire-sig: #eab308;
            --wire-data: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}
        header { background: linear-gradient(90deg, #020617 0%, #0f172a 100%); padding: 1.5rem 2rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .brand-ast { font-weight: 800; font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; }
        .project-title { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        main { display: grid; grid-template-columns: 350px 1fr 300px; gap: 1.5rem; padding: 1.5rem; flex: 1; }
        .panel { background-color: var(--bg-panel); border-radius: 8px; padding: 1.5rem; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10;}
        .panel-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 600; }
        input[type="number"], select { width: 100%; background-color: #0f172a; border: 1px solid #475569; color: var(--text-main); padding: 0.6rem; border-radius: 4px; font-size: 1rem; }
        
        .btn-update { width: 100%; background-color: var(--bg-dark); color: var(--text-main); border: 1px solid var(--accent); padding: 1rem; border-radius: 4px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 1rem; transition: 0.3s; }
        .btn-update:hover { background-color: var(--accent); color: white; }
        
        .btn-wifi { width: 100%; background-color: var(--success); color: white; border: none; padding: 1rem; border-radius: 4px; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 0.5rem; transition: 0.3s; }
        .btn-wifi:hover { background-color: #059669; }

        .diagram-container { display: flex; align-items: center; justify-content: center; background-color: #020617; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        svg { width: 100%; height: auto; max-height: 750px; }
        
        .component { stroke-width: 2.5; fill: #1e293b; stroke: #475569; }
        .component-text { font-size: 14px; font-weight: bold; fill: #f8fafc; }
        .data-tag { font-size: 13px; fill: var(--success); font-weight: bold; font-family: monospace; }
        
        .flow-line { fill: none; stroke-dasharray: 12 8; animation: flowConstant 0.8s linear infinite; }
        @keyframes flowConstant { to { stroke-dashoffset: -40; } }

        .pipe-steam { stroke: var(--pipe-steam); stroke-width: 8; }
        .wire-power { stroke: var(--warning); stroke-width: 3; }
        
        @keyframes flameWobble { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.1) translateY(-4px); } }
        .flame-anim { animation: flameWobble 0.5s ease-in-out infinite; transform-origin: bottom; }

        @keyframes rotateTurbine { to { transform: rotate(360deg); } }
        .turbine-blades { animation: rotateTurbine 0.5s linear infinite; transform-origin: 550px 200px; }

        .result-box { background-color: #0f172a; border: 1px solid #334155; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .result-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.3rem; }
        .result-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: monospace; }
        
        .status-dot { height: 12px; width: 12px; background-color: var(--danger); border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="brand-ast">Analizador Térmico - A.S.T</div>
            <div class="project-title">Gemelo Digital IoT: Caldera + DS18B20 + ESP32</div>
        </div>
        <div style="text-align: right; display: flex; align-items: center;">
            <span class="status-dot" id="conexion-status"></span>
            <div>
                <div style="color: var(--text-muted); font-size: 0.8rem;">ESTADO NUBE</div>
                <div style="font-weight: bold; color: var(--text-main);" id="conexion-texto">DESCONECTADO</div>
            </div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-title">Telemetría Cloud</div>
            <form id="sim-form">
                <div class="form-group" style="background: #020617; padding: 15px; border-radius: 5px; border: 1px solid #3b82f6;">
                    <label style="color: #3b82f6; text-align: center; display: block;">Enlace de Adquisición Global</label>
                    <button type="button" class="btn-wifi" id="btn-conectar-iot">ENLAZAR SENSOR EN VIVO</button>
                </div>
                
                <hr style="border-color: #334155; margin: 20px 0;">

                <div class="form-group">
                    <label>Fuente Térmica</label>
                    <select id="tipo_combustible">
                        <option value="biomasa">Biomasa Pellet (17 MJ/kg)</option>
                        <option value="gas">Gas Natural (50 MJ/kg)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Masa Quemada (Gramos)</label>
                    <input type="number" id="masa_fuel" value="250">
                </div>
                <div class="form-group">
                    <label>Tiempo de Prueba (Segundos)</label>
                    <input type="number" id="tiempo_prueba" value="60">
                </div>
                <div class="form-group">
                    <label>Temperatura Sensor (°C)</label>
                    <input type="number" id="temp_vapor" value="0" readonly style="color: var(--success); font-weight: bold;">
                </div>
                <div class="form-group">
                    <label>Voltaje Generado (V)</label>
                    <input type="number" id="voltaje_gen" value="0.0" readonly>
                </div>
                <div class="form-group">
                    <label>Resistencia Carga (Ω)</label>
                    <input type="number" id="resistencia" value="330">
                </div>

                <button type="button" class="btn-update" id="btn-update">FORZAR CÁLCULO</button>
            </form>
        </div>

        <div class="diagram-container">
            <svg viewBox="0 0 1000 700">
                <rect x="80" y="450" width="160" height="20" fill="#334155" rx="5"/>
                <g class="flame-anim">
                    <path d="M 120 450 Q 160 380 200 450 Z" fill="#ef4444" id="svg-fuego-ext"/>
                    <path d="M 140 450 Q 160 410 180 450 Z" fill="#f59e0b" id="svg-fuego-int"/>
                </g>
                <text x="160" y="490" text-anchor="middle" class="data-tag" style="fill: #ef4444;" id="tag-qin">Qin: 0 W</text>

                <rect x="70" y="250" width="180" height="180" class="component" rx="25" />
                <text x="160" y="340" text-anchor="middle" class="component-text">CALDERA</text>
                
                <path class="flow-line pipe-steam" d="M 280 300 L 450 300 L 450 200 L 520 200" />
                <rect x="360" y="220" width="60" height="40" fill="#1d4ed8" rx="4" />
                <text x="390" y="245" text-anchor="middle" class="component-text" style="font-size: 11px;">DS18B20</text>
                <text x="340" y="325" text-anchor="middle" class="data-tag" id="tag-temp">0.0 °C</text>

                <rect x="550" y="160" width="80" height="80" fill="#64748b" rx="10" />
                <g class="turbine-blades">
                    <path d="M 500 160 L 550 200 L 500 240 Z" fill="#cbd5e1" opacity="0.9" />
                    <path d="M 600 160 L 550 200 L 600 240 Z" fill="#cbd5e1" opacity="0.9" />
                    <circle cx="550" cy="200" r="10" fill="#f8fafc" />
                </g>
                <text x="590" y="150" text-anchor="middle" class="component-text">TURBINA DC</text>

                <path class="flow-line wire-power" d="M 660 190 L 800 190 L 800 480" />
                <rect x="630" y="530" width="120" height="60" fill="#0f172a" rx="5" />
                <text x="690" y="565" text-anchor="middle" class="component-text" style="font-size: 12px;">ESP32 IoT</text>
                
                <text x="850" y="520" text-anchor="middle" class="data-tag" style="fill: var(--warning);" id="tag-voltaje">0.00 V</text>
                <text x="850" y="605" text-anchor="middle" class="data-tag" style="fill: var(--success);" id="tag-potencia">0 mW</text>
            </svg>
        </div>

        <div class="panel">
            <div class="panel-title">Eficiencia Energética</div>
            <div class="result-box">
                <div class="result-label">Potencia Eléctrica (mW)</div>
                <div class="result-value" id="res-elec" style="color: var(--success);">0.00 mW</div>
            </div>
            <div class="result-box">
                <div class="result-label">Potencia Térmica (W)</div>
                <div class="result-value" id="res-termico" style="color: var(--danger);">0.00 W</div>
            </div>
            <div class="result-box">
                <div class="result-label">Eficiencia Global (%)</div>
                <div class="result-value" id="res-eficiencia" style="color: var(--warning);">0.0000 %</div>
            </div>
        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
            });
        }
    </script>
    <script src="simulador.js"></script>
</body>
</html>
